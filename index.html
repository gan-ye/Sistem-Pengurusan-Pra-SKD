    const SYSTEM_PASSWORD = "admin9999"; 

    function checkLogin() {
        const inputVal = document.getElementById('password-input').value.trim();
        const errorMsg = document.getElementById('error-message');
        
        if (inputVal === SYSTEM_PASSWORD) {
            document.getElementById('login-page').style.display = 'none';
            document.getElementById('main-app').style.display = 'flex';
            document.title = "Sistem Pra SKD";
            goToHomepage();
        } else {
            errorMsg.style.display = 'block';
            document.getElementById('password-input').value = "";
            document.getElementById('password-input').focus();
        }
    }

    function handleKeyPress(event) { if (event.key === "Enter") checkLogin(); }

    function logout() {
        document.getElementById('main-app').style.display = 'none';
        document.getElementById('login-page').style.display = 'flex';
        document.getElementById('password-input').value = "";
        document.getElementById('error-message').style.display = 'none';

        mainMenu.subItems.forEach(subItem => {
            const subLi = document.createElement('li'); subLi.innerText = subItem.name;
            subLi.onclick = () => { loadSubpage(`${mainMenu.mainTitle} - ${subItem.name}`, subItem.viewUrl, subItem.editUrl); };
            submenuUl.appendChild(subLi);
        });
        mainLi.appendChild(titleDiv); mainLi.appendChild(submenuUl); menuContainer.appendChild(mainLi);
    });

    function loadSubpage(pageName, viewUrl, editUrl) {
        document.getElementById('page-title').innerText = pageName;
        currentEditUrl = editUrl || ""; 
        const iframeContainer = document.getElementById('iframe-container');
        const editBtn = document.getElementById('edit-btn');
        if (viewUrl) { iframeContainer.innerHTML = `<iframe src="${viewUrl}"></iframe>`; iframeContainer.style.padding = "0"; } 
        else { iframeContainer.innerHTML = `<div style="padding: 40px; text-align: center; color:#e74c3c; font-size: 1.2rem;">⚠️ Pautan Dokumen / Hamparan belum dikonfigurasi.</div>`; }
        editBtn.style.display = 'block';
        if (currentEditUrl === "") { editBtn.style.opacity = "0.5"; editBtn.title = "Fungsi edit tidak diaktifkan untuk dokumen ini"; } 
        else { editBtn.style.opacity = "1"; editBtn.title = "Klik untuk edit dokumen"; }
    }

    function requestEditAccess() {
        if (currentEditUrl === "") { alert("Fungsi edit tidak diaktifkan untuk dokumen ini"); return; }
        const pin = prompt("Sila masukkan nombor PIN yang betul untuk edit dokumen ini:");
        if (pin === null) return; 
        if (pin === "9999") { window.open(currentEditUrl, '_blank'); } 
        else { alert("PIN salah, akses ditolak!"); }
    }

    function goToHomepage() {
        document.getElementById('page-title').innerText = "Maklumat Asas Prasekolah SK Damai (SKD)";
        document.getElementById('edit-btn').style.display = 'none';
        currentEditUrl = ""; 
        document.getElementById('iframe-container').innerHTML = dashboardHTML;
        
        if (clockInterval) clearInterval(clockInterval);
        
        function updateClock() {
            const timeEl = document.getElementById('clock-time');
            const dateEl = document.getElementById('clock-date');
            
            if (!timeEl || !dateEl) return; 
            
            const now = new Date();
            
            // 格式化时间 (24小时制)
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            timeEl.innerText = `${hours}:${minutes}:${seconds}`;
            
            // ★ 核心修改：使用 ms-MY 本地化格式输出马来文日期 ★
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            dateEl.innerText = now.toLocaleDateString('ms-MY', options);
        }
        
        updateClock();
        clockInterval = setInterval(updateClock, 1000);
    }
    </script>
</body>
</html>
